name: Publish graphify knowledge graph

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - swift
    paths:
      - 'graphify-out/**'
      - '.github/workflows/graphify-pages.yml'

permissions:
  contents: write

concurrency:
  group: graphify-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare graphify artifact
        shell: bash
        run: |
          test -f graphify-out/GRAPH_REPORT.md
          test -f graphify-out/graph.json
          mkdir -p _graphify_pages
          cp -R graphify-out/. _graphify_pages/
          repo_readme_url="https://github.com/${GITHUB_REPOSITORY}#readme"
          graph_link="graph.html"
          graph_label="Open graphify visual graph"
          if [ -f _graphify_pages/graph.html ]; then
            graph_link="graph.html"
            graph_label="Open interactive graphify visual graph"
          else
            graph_link="graph.html.skipped.txt"
            graph_label="Interactive graph skipped; view renderer note"
          fi
          cat > _graphify_pages/README.md <<EOF
          # graphify Knowledge Graph

          - [${graph_label}](${graph_link})
          - [GRAPH_REPORT.md](GRAPH_REPORT.md)
          - [graph.json](graph.json)
          EOF
          cat > _graphify_pages/index.html <<HTML
          <!doctype html>
          <html lang="zh-CN">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>graphify Knowledge Graph</title>
              <style>
                body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; line-height: 1.6; color: #1f2937; background: #f8fafc; }
                main { max-width: 860px; margin: 0 auto; padding: 48px 24px; }
                h1 { margin: 0 0 12px; font-size: 2rem; }
                p { color: #4b5563; }
                .actions { display: grid; gap: 12px; margin-top: 28px; }
                a.card { display: block; padding: 18px 20px; border: 1px solid #dbe3ef; border-radius: 8px; background: #fff; color: #1d4ed8; text-decoration: none; }
                a.card strong { display: block; color: #111827; }
                a.card span { color: #64748b; }
              </style>
            </head>
            <body>
              <main>
                <h1>graphify Knowledge Graph</h1>
                <p>This repository publishes its graphify knowledge graph artifacts here for agent and human review.</p>
                <div class="actions">
                  <a class="card" href="${graph_link}"><strong>${graph_label}</strong><span>Visualize code relationships generated by graphify.</span></a>
                  <a class="card" href="GRAPH_REPORT.md"><strong>Read GRAPH_REPORT.md</strong><span>Inspect graph statistics, communities, and analysis notes.</span></a>
                  <a class="card" href="graph.json"><strong>Download graph.json</strong><span>Use the graph data in agent-harness or other tools.</span></a>
                  <a class="card" href="${repo_readme_url}"><strong>Open README.md</strong><span>Open this repository README on GitHub.</span></a>
                </div>
              </main>
            </body>
          </html>
          HTML
          touch _graphify_pages/.nojekyll

      - name: Publish gh-pages branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          cd _graphify_pages
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Publish graphify knowledge graph"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
